<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Send feedback · sskplay</title>
    <meta name="description" content="Send feedback on any app by sskplay — a bug, an idea, or a rating." />
    <link rel="icon" href="/airplay-touch/assets/icon-512.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #111;
        --muted: #6b6b6b;
        --line: #e5e5e5;
        --card: #fff;
        --field: #fff;
        --accent: #0a84ff;
        --accent-fg: #fff;
        --ok: #1a8f4c;
        --err: #d23c3c;
        --star: #f5a623;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0b0c;
          --fg: #f3f3f3;
          --muted: #9a9a9f;
          --line: #232326;
          --card: #141416;
          --field: #0f1013;
          --accent: #4ea1ff;
          --accent-fg: #0b0b0c;
          --ok: #5ad19a;
          --err: #ff7a7a;
          --star: #ffce5a;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }

      .container { max-width: 560px; margin: 0 auto; padding: 0 1.25rem; }

      header.site { padding: 3.5rem 0 1.5rem; }
      header.site h1 {
        font-size: clamp(1.6rem, 5vw, 2.1rem);
        margin: 0 0 .35rem;
        letter-spacing: -.02em;
      }
      header.site p { margin: 0; color: var(--muted); }

      main { padding-bottom: 3rem; }

      form.card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 1.5rem 1.4rem 1.6rem;
      }

      label {
        display: block;
        margin: 1.1rem 0 .4rem;
        font-size: .82rem;
        letter-spacing: .02em;
        color: var(--muted);
      }
      label:first-of-type { margin-top: 0; }

      select, input, textarea {
        width: 100%;
        padding: .7rem .75rem;
        background: var(--field);
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
      }
      select:focus, input:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      textarea { min-height: 130px; resize: vertical; }

      .seg { display: flex; gap: .5rem; }
      .seg button {
        flex: 1;
        padding: .65rem .5rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: transparent;
        color: var(--fg);
        cursor: pointer;
        font: inherit;
      }
      .seg button[aria-pressed="true"] {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
        font-weight: 600;
      }

      .stars { display: flex; gap: .35rem; font-size: 1.7rem; line-height: 1; }
      .stars span { cursor: pointer; color: var(--line); }
      .stars span.on { color: var(--star); }

      button.submit {
        width: 100%;
        margin-top: 1.4rem;
        padding: .8rem;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: var(--accent-fg);
        font: 600 1rem/1 inherit;
        cursor: pointer;
      }
      button.submit:disabled { opacity: .55; cursor: default; }

      .msg { margin-top: .9rem; font-size: .9rem; min-height: 1.2rem; }
      .msg.ok { color: var(--ok); }
      .msg.err { color: var(--err); }
      .hidden { display: none; }

      footer.site {
        margin-top: 2rem;
        padding: 2rem 0 3rem;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: .9rem;
      }
      footer.site .row {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: .5rem;
      }
    </style>
  </head>
  <body>
    <header class="site">
      <div class="container">
        <h1>Send feedback</h1>
        <p>A bug, an idea, or a rating — all welcome. Submitted anonymously.</p>
      </div>
    </header>

    <main class="container">
      <form class="card" id="form">
        <label for="about">What's this about?</label>
        <select id="about">
          <option value="web">This site / general</option>
          <optgroup label="Apps">
            <option value="airplay-touch">AirPlay Touch</option>
            <option value="audiocast">AudioCast</option>
            <option value="app-pin">App Pin</option>
            <option value="coupox">Coupox</option>
            <option value="harudama">Harudama</option>
            <option value="jailphone">Jail Phone</option>
            <option value="kidssms">Kids SMS</option>
            <option value="hhkb-moim">HHKB Moim</option>
            <option value="hanam-lib">Hanam Library Moim</option>
            <option value="qbell">QBell</option>
            <option value="magnifier">Magnifier</option>
            <option value="teamplay">Team Play</option>
          </optgroup>
          <optgroup label="Games">
            <option value="battleship">Fastest Battleship</option>
            <option value="fireworks">Mono Fireworks</option>
            <option value="pong">Mono Pong</option>
            <option value="hangman">Mono Hangman</option>
            <option value="potato">Mono Potato Volleyball</option>
            <option value="missile-defense">Mono Missile Defense</option>
            <option value="scorch">Mono Scorch</option>
            <option value="snake">Mono Snake</option>
            <option value="monoban">Monoban</option>
          </optgroup>
        </select>

        <label>Type</label>
        <div class="seg" id="type">
          <button type="button" data-type="bug" aria-pressed="true">🐞 Bug</button>
          <button type="button" data-type="idea">💡 Idea</button>
          <button type="button" data-type="rating">⭐ Rating</button>
        </div>

        <div id="ratingRow" class="hidden">
          <label>Rating</label>
          <div class="stars" id="stars" role="radiogroup" aria-label="Rating">
            <span data-v="1" role="radio" aria-label="1 star">★</span><span data-v="2" role="radio" aria-label="2 stars">★</span><span data-v="3" role="radio" aria-label="3 stars">★</span><span data-v="4" role="radio" aria-label="4 stars">★</span><span data-v="5" role="radio" aria-label="5 stars">★</span>
          </div>
        </div>

        <label for="message">Message</label>
        <textarea id="message" placeholder="What happened? Steps to reproduce, or what you'd like to see."></textarea>

        <label for="contact">Contact (optional — if you'd like a reply)</label>
        <input id="contact" type="text" placeholder="Email or any way to reach you" maxlength="200" />

        <button class="submit" id="submit" type="submit">Send</button>
        <div class="msg" id="out" role="status" aria-live="polite"></div>
      </form>
    </main>

    <footer class="site">
      <div class="container row">
        <span>© sskplay</span>
        <span><a href="/">All apps</a></span>
      </div>
    </footer>

    <script>
      const ENDPOINT = "https://api.feedback.sskplay.com/feedback";
      const APP_KEY = "ffd5a0a3aaddecb1f69100ab06f1b6939f974f19d668755f"; // shared client key (not secret-grade by design)
      const APP_VERSION = "1.0.0";

      let type = "bug";
      let rating = 0;
      const $ = (id) => document.getElementById(id);

      // Pre-select the app from ?app=<slug>. If the slug isn't a known option,
      // add it so feedback still lands under the right label.
      (function preselect() {
        const slug = new URLSearchParams(location.search).get("app");
        if (!slug) return;
        const sel = $("about");
        let match = [...sel.options].find((o) => o.value === slug);
        if (!match && /^[a-z0-9-]{1,40}$/.test(slug)) {
          match = new Option(slug, slug);
          sel.add(match);
        }
        if (match) sel.value = slug;
      })();

      $("type").addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (!b) return;
        type = b.dataset.type;
        [...$("type").children].forEach((x) => x.setAttribute("aria-pressed", x === b));
        $("ratingRow").classList.toggle("hidden", type !== "rating");
      });

      $("stars").addEventListener("click", (e) => {
        const s = e.target.closest("span");
        if (!s) return;
        rating = +s.dataset.v;
        [...$("stars").children].forEach((x) => x.classList.toggle("on", +x.dataset.v <= rating));
      });

      $("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const out = $("out");
        const message = $("message").value.trim();
        if (!message) { out.className = "msg err"; out.textContent = "Please enter a message."; return; }
        if (type === "rating" && !rating) { out.className = "msg err"; out.textContent = "Please pick a star rating."; return; }

        const about = $("about").value; // "web" for general, else the app slug
        const aboutLabel = $("about").options[$("about").selectedIndex].text;
        const payload = {
          product: about || "web",
          app: "web",
          app_version: APP_VERSION,
          platform: navigator.userAgent.slice(0, 120),
          type,
          message: `[${aboutLabel}] ${message}`,
          context: { locale: navigator.language },
        };
        const contact = $("contact").value.trim();
        if (contact) payload.contact = contact;
        if (type === "rating") payload.rating = rating;

        $("submit").disabled = true;
        out.className = "msg";
        out.textContent = "Sending…";
        try {
          const res = await fetch(ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-AC-Key": APP_KEY },
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(() => ({}));
          if (res.status === 202 && data.ok) {
            $("form").reset();
            rating = 0;
            type = "bug";
            [...$("stars").children].forEach((x) => x.classList.remove("on"));
            [...$("type").children].forEach((x) => x.setAttribute("aria-pressed", x.dataset.type === "bug"));
            $("ratingRow").classList.add("hidden");
            out.className = "msg ok";
            out.textContent = "Thanks! Got it. ✅";
          } else if (res.status === 429) {
            out.className = "msg err";
            out.textContent = "You've hit today's submission limit. Please try again tomorrow.";
          } else {
            out.className = "msg err";
            out.textContent = "Couldn't send: " + (data.error || res.status);
          }
        } catch (err) {
          out.className = "msg err";
          out.textContent = "Network error — couldn't send.";
        } finally {
          $("submit").disabled = false;
        }
      });
    </script>
  </body>
</html>

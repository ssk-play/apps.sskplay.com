<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mono Pong — retro pong with 5 stages and a watch mode</title>
    <meta name="description" content="Classic pong reimagined — 5 stages, obstacles that shake and spark, smarter AI, and an AI-vs-AI watch mode." />
    <meta property="og:title" content="Mono Pong" />
    <meta property="og:description" content="Retro pong with 5 stages, obstacles, sparks, and a watch mode." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apps.sskplay.com/pong/" />
    <meta property="og:image" content="https://apps.sskplay.com/pong/assets/shot1.webp" />
    <link rel="icon" href="assets/icon-512.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #111;
        --muted: #6b6b6b;
        --line: #e5e5e5;
        --card: #fff;
        --accent: #0a84ff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0b0c;
          --fg: #f3f3f3;
          --muted: #9a9a9f;
          --line: #232326;
          --card: #141416;
          --accent: #4ea1ff;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .container { max-width: 920px; margin: 0 auto; padding: 0 1.25rem; }

      header.site {
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--line);
      }
      header.site nav a { color: var(--muted); font-size: .9rem; }

      .hero {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 1.25rem;
        align-items: center;
        padding: 3rem 0 2rem;
      }
      .hero img.icon {
        width: 96px; height: 96px;
        border-radius: 22px;
        box-shadow: 0 4px 20px rgba(0,0,0,.08);
        image-rendering: pixelated;
      }
      .hero h1 {
        margin: 0 0 .25rem;
        font-size: clamp(1.6rem, 4vw, 2.25rem);
        letter-spacing: -.01em;
      }
      .hero p.tagline {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .cta {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem;
        margin: 1.25rem 0 3rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        padding: .65rem 1.1rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: .95rem;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fg);
      }
      .btn.primary {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }
      .btn.primary:hover { text-decoration: none; opacity: .92; }

      section { padding: 2rem 0; border-top: 1px solid var(--line); }
      section h2 {
        font-size: 1.1rem;
        letter-spacing: .04em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 1rem;
      }

      .shots {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: 1fr;
        align-items: start;
        gap: 1rem;
      }
      .shots img {
        width: 100%;
        height: auto;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--card);
        display: block;
        image-rendering: pixelated;
      }

      footer.site {
        margin-top: 2rem;
        padding: 2rem 0 3rem;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: .9rem;
      }
    </style>
  </head>
  <body>
    <header class="site">
      <div class="container">
        <nav><a href="/">← apps.sskplay.com</a></nav>
      </div>
    </header>

    <main class="container">
      <section class="hero" style="border: 0; padding-top: 3rem;">
        <img class="icon" src="assets/icon-512.png" alt="Mono Pong icon" width="96" height="96" />
        <div>
          <h1>Mono Pong</h1>
          <p class="tagline">Retro pong with 5 stages, sparking obstacles, and an AI-vs-AI watch mode.</p>
        </div>
      </section>

      <div class="cta">
        <a class="btn primary" href="https://play.google.com/store/apps/details?id=com.ssk.pong">Get it on Google Play</a>
      </div>

      <section>
        <h2>Screenshots</h2>
        <div class="shots">
          <img src="assets/shot1.webp" alt="Gameplay" loading="lazy" />
          <img src="assets/shot2.webp" alt="Scoring" loading="lazy" />
          <img src="assets/shot3.webp" alt="Rally" loading="lazy" />
          <img src="assets/shot4.webp" alt="Game over" loading="lazy" />
        </div>
      </section>
    </main>

    <footer class="site">
      <div class="container" style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: .5rem;">
        <span>© sskplay</span>
        <span><a href="/">All apps</a></span>
      </div>
    </footer>
  </body>
</html>
